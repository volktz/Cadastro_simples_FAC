<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="form-title">
      <h1 id="form-title">Criar conta</h1>
      <p class="subtitle">Preencha os dados para concluir seu cadastro.</p>

      <!--
        O formulário envia os dados para o backend via método POST.
        Nenhuma lógica PHP foi inserida no HTML para manter a separação de responsabilidades.
      -->
      <form action="process.php" method="POST" class="register-form" novalidate>
        <div class="field">
          <label for="nome">Nome</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Seu nome completo"
            required
            minlength="2"
            maxlength="100"
            autocomplete="name"
          >
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="voce@exemplo.com"
            required
            maxlength="150"
            autocomplete="email"
          >
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="No minimo 8 caracteres"
            required
            minlength="8"
            maxlength="72"
            autocomplete="new-password"
          >
        </div>

        <button type="submit">Cadastrar</button>
      </form>
    </section>
  </main>
</body>
</html>
